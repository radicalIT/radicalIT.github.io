<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>radicalIT</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css?family=Inconsolata&amp;subset=latin-ext" rel="stylesheet">
    <link rel="stylesheet" href="fontello/css/fontello.css">
</head>
<body>
    <div id="header">
        <div id="headbar">
            <div id="name">
                    <i class="icon-github"></i>radicalIT</div>
            <div id="clock"></div>
        </div>
    </div>
    
    <div id="container">
        <table>
            <tr>
                <td class="option">
                    <i class="icon-user"></i>
                </td>
                <td class="option">
                    <i class="icon-clipboard"></i>
                </td>
                <td rowspan="2" colspan="3" id="content">content</td>
            </tr>
            <tr>
                <td class="option">
                    <i class="icon-picture"></i>
                </td>
                <td class="option">
                    <i class="icon-phone"></i>
                </td>
            </tr>
            <tr>
                <td colspan="2" id="longbar">quote</td>
                <td class="social">
                    <i class="icon-facebook"></i>
                </td>
                <td class="social">
                    <i class="icon-mail"></i>
                </td>
                <td class="social">
                    <i class="icon-github"></i>
                </td>
            </tr>
        </table>
    </div>
    <div id="footer">
        Copyright &#9400; Kacper Osika 2019r.
    </div>
    <script src="script.js"></script>
</body>
</html>
